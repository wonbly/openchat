    <head>

        <title>보안 리포트</title>
        <style>
            body {

                background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); color: white;
            }
            .login-box {

                box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; color: #1a1a1a;

                border-radius: 10px; font-size: 16px; outline: none; text-align: center; box-sizing: border-box;
            }
            .login-box button {
                width: 100%; padding: 12px; background: #03c75a; color: white;
                border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer;
            }
            #error-msg { color: #e74c3c; font-size: 12px; margin-top: 15px; display: none; }
        </style>

            function decrypt_data(b64, pwd) {
                try {
                    const binaryString = atob(b64);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        bytes[i] = binaryString.charCodeAt(i);
                    }
                    
                    const encoder = new TextEncoder();
                    const pwdBytes = encoder.encode(pwd);
                    
                    for (let i = 0; i < bytes.length; i++) {
                        bytes[i] = bytes[i] ^ pwdBytes[i % pwdBytes.length];
                    }
                    
                    const decoder = new TextDecoder('utf-8');
                    return decoder.decode(bytes);
                } catch (e) {
                    return null;
                }
            }

            function checkPwd() {
                const pwd = document.getElementById('pwd').value;
                if (!pwd) return;
                
                const decodedHTML = decrypt_data(encryptedRawData, pwd);
                
                // 디코딩 성공 여부를 키워드로 확인
                if (decodedHTML && decodedHTML.includes('가봄 오픈채팅 리포트')) {
                    document.open();
                    document.write(decodedHTML);
                    document.close();
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            }
